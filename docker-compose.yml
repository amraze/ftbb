version: '3.8'

services:
  # ───────────────────────────────
  # MICROSERVICES — PDF EXTRACTOR
  # ───────────────────────────────
  pdf-extractor:
    build:
      context: ./src/Services/PdfExtractor/FTBB.PdfExtractor
      dockerfile: Dockerfile
    container_name: pdf-extractor
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - DOWNLOADS_PATH=/downloads
    volumes:
      - type: bind
        source: ./src/Services/PdfWorker/FTBB.PdfWorker/Downloads
        target: /downloads
    depends_on:
      - rabbitmq
      - redis
      - loki
    restart: unless-stopped
    networks:
      - monitoring
  # ───────────────────────────────
  # COMMON — RABBITMQ, REDIS
  # ───────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - monitoring

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - monitoring

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - monitoring

  # ───────────────────────────────
  # LGTP — LOKI, GRAFANA, TEMPO, PROMETHEUS
  # ───────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: loki
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/monitoring/loki/config.yml:/etc/loki/config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - loki
      - tempo
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  tempo:
    image: grafana/tempo:2.4.2  
    container_name: tempo
    user: "0"
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infrastructure/monitoring/tempo/config.yml:/etc/tempo/config.yml
      - tempo_data:/var/tempo
    command: -config.file=/etc/tempo/config.yml
    restart: unless-stopped
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/config.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "12345:12345"
    volumes:
      - ./infrastructure/monitoring/alloy/config.alloy:/etc/alloy/config.alloy
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run /etc/alloy/config.alloy
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - monitoring

volumes:
  grafana_data:
  loki_data:
  tempo_data:
  prometheus_data:

networks:
  monitoring:
    driver: bridge